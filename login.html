<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hidráulica Pro Brasil</title>
    <link rel="stylesheet" href="bomba.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
            padding-top: 70px;
        }

        .login-container {
            width: 360px;
            padding: 40px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }

        .login-container h2 {
            margin: 0 0 30px;
            padding: 0;
            color: #333;
            text-align: center;
            font-size: 28px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: #333;
            border: none;
            border-bottom: 2px solid #ccc;
            outline: none;
            background: transparent;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            font-size: 16px;
            color: #999;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            left: 0;
            color: #007bff;
            font-size: 12px;
            font-weight: bold;
        }

        .input-group input:focus {
            border-bottom: 2px solid #007bff;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #28a745;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #218838;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            color: #28a745;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #0066ff;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" required>
                <label for="email">Usuário (Email)</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required>
                <label for="password">Senha</label>
            </div>
            <button type="submit" class="login-btn">Entrar</button>
        </form>
        <div class="back-link">
            <a href="bomba.html">← Voltar para Home</a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
